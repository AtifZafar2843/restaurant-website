<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Restaurant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-[#0A0A0A] text-white overflow-x-hidden">
    <!-- Floating Navbar -->
    <nav class="fixed top-8 right-8 z-50 bg-black/20 backdrop-blur-md rounded-full px-6 py-3">
        <ul class="flex space-x-8">
            <li><a href="#" class="text-white/80 hover:text-white transition-colors">Home</a></li>
            <li><a href="#" class="text-white/80 hover:text-white transition-colors">Menu</a></li>
            <li><a href="#" class="text-white/80 hover:text-white transition-colors">Gallery</a></li>
            <li><a href="#" class="text-white/80 hover:text-white transition-colors">Reserve</a></li>
            <li><a href="#" class="text-white/80 hover:text-white transition-colors">Contact</a></li>
        </ul>
    </nav>

    <!-- Hero Section -->
    <section class="min-h-screen relative flex items-center px-8 md:px-16 lg:px-24">
        <!-- Left Content -->
        <div class="w-full lg:w-1/2 relative z-10">
            <div class="max-w-xl">
                <h1 class="font-playfair text-5xl md:text-7xl lg:text-8xl font-bold leading-tight mb-6">
                    Éclat
                </h1>
                <p class="font-poppins text-xl md:text-2xl text-white/80 mb-12">
                    Taste Beyond Imagination
                </p>
                <div class="flex flex-wrap gap-4">
                    <button class="bg-white text-black px-8 py-4 rounded-full font-medium hover:bg-white/90 transition-colors">
                        View Menu
                    </button>
                    <button class="border border-white/30 px-8 py-4 rounded-full font-medium hover:bg-white/10 transition-colors">
                        Order Online
                    </button>
                </div>
            </div>
        </div>

        <!-- Right Content - Image Container -->
        <div class="hidden lg:block w-1/2 relative">
            <div class="absolute right-0 top-1/2 -translate-y-1/2 w-[600px] h-[600px]">
                <div class="absolute inset-0 bg-gradient-to-br from-purple-500/20 to-pink-500/20 rounded-full blur-3xl"></div>
                <div class="absolute inset-0 rounded-full overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=1470&q=80" 
                         alt="Restaurant Interior" 
                         class="w-full h-full object-cover">
                </div>
            </div>
        </div>

        <!-- Scroll Indicator -->
        <div class="absolute bottom-8 left-1/2 -translate-x-1/2">
            <div class="w-6 h-10 border-2 border-white/30 rounded-full flex justify-center">
                <div class="w-1 h-3 bg-white/50 rounded-full mt-2"></div>
            </div>
        </div>
    </section>
</body>
</html>
